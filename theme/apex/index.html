<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{title}} | {{subtitle}}</title>
    <link rel="stylesheet" href="theme/apex/css/index.css">
  </head>
  <body>
    <button class="Hamburger" id="hamburger">
      <svg class="hamburger-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M3 4H21V6H3V4ZM3 11H21V13H3V11ZM3 18H21V20H3V18Z"></path></svg>
      <svg class="close-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" style="display: none;"><path d="M11.9997 10.5865L16.9495 5.63672L18.3637 7.05093L13.4139 12.0007L18.3637 16.9504L16.9495 18.3646L11.9997 13.4149L7.04996 18.3646L5.63574 16.9504L10.5855 12.0007L5.63574 7.05093L7.04996 5.63672L11.9997 10.5865Z"></path></svg>
    </button>

    <div class="Wrapper">
      <div class="Container">
        <div class="Header">
          <div class="Title center">
            <span class="text">{{title}}</span>
            <span class="subtext">{{subtitle}}</span>
          </div>
        </div>

        <div class="Content-wrapper" id="content-wrapper">
          <div class="Sidebar" id="sidebar">
            <div class="Menu">
              {{#each pages}}
                <div class="item">
                  <a href="#{{slug}}">{{title}}</a>
                </div>
              {{/each}}
            </div>
          </div>

          <div class="Content">
            {{#each pages}}
              <div class="Page" id="{{slug}}">
                <h1>{{title}}</h1>
                {{{content}}}
              </div>
            {{/each}}
            <div class="Footer"></div>
            <script src="theme/apex/js/index.js"></script>
          </div>
        </div>
    </div>
  </body>
</html>
